<style>
    /* General Reset */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* Dashboard Layout */
.dashboard-container {
  display: flex;
  height: 100vh;
  font-family: Arial, sans-serif;
}

/* Sidebar Styling */
.dashboard-sidebar {
  background-color: #2d6a4f;
  color: #fff;
  width: 250px;
  padding: 20px;
}

.dashboard-sidebar h2 {
  font-size: 1.5rem;
  margin-bottom: 20px;
  text-align: center;
  border-bottom: 2px solid #b7e4c7;
  padding-bottom: 10px;
}

.sidebar-menu {
  list-style: none;
}

.sidebar-menu li {
  margin: 15px 0;
}

.sidebar-menu a {
  color: #fff;
  text-decoration: none;
  font-size: 1rem;
  display: block;
  padding: 10px 15px;
  border-radius: 5px;
  transition: background-color 0.3s ease;
}

.sidebar-menu a:hover {
  background-color: #b7e4c7;
  color: #2d6a4f;
}

/* Main Content Styling */
.dashboard-main {
  flex: 1;
  padding: 20px;
  background-color: #f4f4f4;
  overflow-y: auto;
}

.dashboard-header h1 {
  font-size: 2rem;
  color: #2d6a4f;
}

.dashboard-header p {
  color: #555;
  margin-top: 10px;
}

/* Card Styling */
.dashboard-content {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  margin-top: 20px;
}

.card {
  background-color: #fff;
  border-radius: 10px;
  box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
  padding: 20px;
  text-align: center;
  transition: transform 0.3s ease;
}

.card:hover {
  transform: translateY(-5px);
}

.card h3 {
  color: #2d6a4f;
  margin-bottom: 10px;
}

.card p {
  color: #555;
}

/* Responsive Design */
@media (max-width: 768px) {
  .dashboard-container {
    flex-direction: column;
  }

  .dashboard-sidebar {
    width: 100%;
    text-align: center;
  }
}

</style>

<div class="dashboard-container">
    <!-- Sidebar -->
    <aside class="dashboard-sidebar">
      <h2>User Dashboard</h2>
      <ul class="sidebar-menu">
        <li><a href="#">Overview</a></li>
        <li><a href="#">Profile</a></li>
        <li><a href="#">Messages</a></li>
        <li><a href="#">Settings</a></li>
        <li><a href="#">Logout</a></li>
      </ul>
    </aside>
  
    <!-- Main Content -->
    <main class="dashboard-main">
      <div class="dashboard-header">
        <h1>Welcome, [User Name]</h1>
        <p>Your recent activities and updates are shown below.</p>
      </div>
      <div class="dashboard-content">
        <div class="card">
          <h3>Recent Activity</h3>
          <p>You joined 2 new groups this week.</p>
        </div>
        <div class="card">
          <h3>Messages</h3>
          <p>You have 3 unread messages.</p>
        </div>
        <div class="card">
          <h3>Upcoming Events</h3>
          <p>No events scheduled for this week.</p>
        </div>
      </div>
    </main>
  </div>
